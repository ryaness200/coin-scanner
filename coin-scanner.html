<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NY 시초가 스캐너</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060809;
  --bg2: #0d1117;
  --bg3: #161b22;
  --border: rgba(255,255,255,0.06);
  --green: #3fb950;
  --red: #f85149;
  --yellow: #d29922;
  --blue: #58a6ff;
  --text: #e6edf3;
  --muted: #484f58;
  --muted2: #8b949e;
  --font: 'DM Mono', monospace;
  --font2: 'Noto Sans KR', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font2); min-height: 100vh; }

/* ── Header ── */
header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.logo { font-family: var(--font); font-size: 13px; color: var(--blue); letter-spacing: 3px; }
.ny-time { font-family: var(--font); font-size: 11px; color: var(--muted2); display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
.ny-clock { font-size: 14px; color: var(--text); }
.session-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
  font-family: var(--font);
}
.session-active { background: rgba(63,185,80,0.15); color: var(--green); border: 1px solid rgba(63,185,80,0.3); }
.session-inactive { background: rgba(72,79,88,0.2); color: var(--muted2); border: 1px solid var(--border); }

/* ── Main ── */
.main { padding: 12px; max-width: 520px; margin: 0 auto; }

/* ── Info bar ── */
.info-bar {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.info-text { font-size: 12px; color: var(--muted2); line-height: 1.6; }
.info-text strong { color: var(--blue); }
.scan-btn {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--blue);
  background: rgba(88,166,255,0.1);
  color: var(--blue);
  font-family: var(--font);
  font-size: 11px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.15s;
  white-space: nowrap;
}
.scan-btn:hover { background: rgba(88,166,255,0.2); }
.scan-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Session timer ── */
.session-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 12px;
}
.session-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.session-label { font-size: 11px; color: var(--muted2); font-family: var(--font); }
.session-time { font-size: 11px; color: var(--muted2); font-family: var(--font); }
.session-track { height: 4px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
.session-fill { height: 100%; border-radius: 99px; background: var(--green); transition: width 0.5s; }

/* ── Stats row ── */
.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
.stat-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; text-align: center; }
.stat-val { font-family: var(--font); font-size: 22px; font-weight: 500; }
.stat-lbl { font-size: 10px; color: var(--muted2); margin-top: 2px; font-family: var(--font); }
.buy-val { color: var(--green); }
.sell-val { color: var(--red); }
.neutral-val { color: var(--yellow); }

/* ── Filter tabs ── */
.filter-row { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; scrollbar-width: none; }
.filter-row::-webkit-scrollbar { display: none; }
.filter-btn {
  flex-shrink: 0;
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--muted2);
  font-family: var(--font);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn.all.active { border-color: var(--blue); color: var(--blue); background: rgba(88,166,255,0.08); }
.filter-btn.buy.active { border-color: var(--green); color: var(--green); background: rgba(63,185,80,0.08); }
.filter-btn.sell.active { border-color: var(--red); color: var(--red); background: rgba(248,81,73,0.08); }
.filter-btn.neutral.active { border-color: var(--yellow); color: var(--yellow); background: rgba(210,153,34,0.08); }

/* ── Coin cards ── */
.coins-list { display: flex; flex-direction: column; gap: 8px; }
.coin-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  transition: border-color 0.15s;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
.coin-card.buy { border-left: 3px solid var(--green); }
.coin-card.sell { border-left: 3px solid var(--red); }
.coin-card.neutral { border-left: 3px solid var(--yellow); }

.coin-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.coin-name-wrap { display: flex; align-items: center; gap: 8px; }
.coin-symbol { font-family: var(--font); font-size: 15px; font-weight: 500; }
.coin-rank { font-family: var(--font); font-size: 10px; color: var(--muted2); background: var(--bg3); padding: 2px 6px; border-radius: 4px; }
.coin-price { font-family: var(--font); font-size: 14px; text-align: right; }
.coin-change { font-size: 11px; font-family: var(--font); }

.signal-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  margin-bottom: 10px;
}
.signal-pill.buy { background: rgba(63,185,80,0.12); color: var(--green); border: 1px solid rgba(63,185,80,0.25); }
.signal-pill.sell { background: rgba(248,81,73,0.12); color: var(--red); border: 1px solid rgba(248,81,73,0.25); }
.signal-pill.neutral { background: rgba(210,153,34,0.1); color: var(--yellow); border: 1px solid rgba(210,153,34,0.2); }

.indicators { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; }
.ind { background: var(--bg3); border-radius: 8px; padding: 7px 6px; text-align: center; }
.ind-name { font-size: 9px; color: var(--muted2); font-family: var(--font); margin-bottom: 3px; }
.ind-val { font-family: var(--font); font-size: 12px; font-weight: 500; }
.ind-sub { font-size: 9px; color: var(--muted2); margin-top: 1px; }

.reasons { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
.reason-tag {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  font-family: var(--font);
  background: var(--bg3);
  color: var(--muted2);
}

/* ── Loading / Empty ── */
.loading { text-align: center; padding: 48px 20px; color: var(--muted2); font-size: 13px; font-family: var(--font); }
.loading-spin { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.progress-text { font-size: 11px; color: var(--muted2); font-family: var(--font); margin-top: 6px; }
.empty { text-align: center; padding: 40px 20px; color: var(--muted2); font-size: 13px; }

.disclaimer { font-size: 10px; color: var(--muted); text-align: center; padding: 16px; line-height: 1.7; }
</style>
</head>
<body>

<header>
  <div class="logo">NY SCANNER</div>
  <div class="ny-time">
    <div class="ny-clock" id="nyClock">--:--:--</div>
    <div class="session-badge session-inactive" id="sessionBadge">세션 외</div>
  </div>
</header>

<div class="main">

  <div class="info-bar">
    <div class="info-text">
      뉴욕 <strong>09:00~10:00</strong> 5분봉 기준<br>
      거래량 상위 코인 자동 스캔
    </div>
    <button class="scan-btn" id="scanBtn" onclick="startScan()">▶ 스캔 시작</button>
  </div>

  <div class="session-card" id="sessionCard">
    <div class="session-row">
      <span class="session-label" id="sessionLabel">뉴욕 세션까지</span>
      <span class="session-time" id="sessionTimeText">--:--</span>
    </div>
    <div class="session-track"><div class="session-fill" id="sessionFill" style="width:0%"></div></div>
  </div>

  <div class="stats-row">
    <div class="stat-box"><div class="stat-val buy-val" id="statBuy">-</div><div class="stat-lbl">매수신호</div></div>
    <div class="stat-box"><div class="stat-val neutral-val" id="statNeutral">-</div><div class="stat-lbl">중립</div></div>
    <div class="stat-box"><div class="stat-val sell-val" id="statSell">-</div><div class="stat-lbl">매도신호</div></div>
  </div>

  <div class="filter-row">
    <button class="filter-btn all active" onclick="setFilter('all',this)">전체</button>
    <button class="filter-btn buy" onclick="setFilter('buy',this)">▲ 매수</button>
    <button class="filter-btn sell" onclick="setFilter('sell',this)">▼ 매도</button>
    <button class="filter-btn neutral" onclick="setFilter('neutral',this)">◆ 중립</button>
  </div>

  <div class="coins-list" id="coinsList">
    <div class="loading" style="padding:32px 0">
      <div style="font-size:12px;color:var(--muted2)">스캔 시작 버튼을 눌러주세요</div>
    </div>
  </div>

  <div class="disclaimer">
    ※ 본 앱의 신호는 기술적 지표 기반 참고용입니다.<br>투자 판단 및 손익의 책임은 본인에게 있습니다.
  </div>
</div>

<script>
// ── 상수 ──
const PROXY = 'https://corsproxy.io/?';
const PROXY2 = 'https://api.allorigins.win/raw?url=';

async function proxyFetch(url) {
  const proxies = [PROXY, PROXY2];
  for (const p of proxies) {
    try {
      const res = await fetch(p + encodeURIComponent(url));
      if (res.ok) return res;
    } catch(e) { continue; }
  }
  throw new Error('네트워크 오류');
}

// ── 뉴욕 시간 ──
function getNYTime() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/New_York' }));
}

function isNYSession() {
  const ny = getNYTime();
  const h = ny.getHours(), m = ny.getMinutes();
  return (h === 9) || (h === 9 && m < 60);
}

function updateClock() {
  const ny = getNYTime();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('nyClock').textContent =
    `${pad(ny.getHours())}:${pad(ny.getMinutes())}:${pad(ny.getSeconds())} NY`;

  const h = ny.getHours(), m = ny.getMinutes(), s = ny.getSeconds();
  const badge = document.getElementById('sessionBadge');
  const fill = document.getElementById('sessionFill');
  const label = document.getElementById('sessionLabel');
  const timeText = document.getElementById('sessionTimeText');

  if (h === 9) {
    // 세션 중
    badge.className = 'session-badge session-active';
    badge.textContent = '세션 중 🔴';
    label.textContent = '세션 종료까지';
    const elapsed = m * 60 + s;
    const total = 60 * 60;
    fill.style.width = (elapsed / total * 100) + '%';
    const remain = total - elapsed;
    timeText.textContent = `${pad(Math.floor(remain/60))}:${pad(remain%60)}`;
  } else if (h < 9) {
    badge.className = 'session-badge session-inactive';
    badge.textContent = '세션 대기';
    label.textContent = '세션 시작까지';
    const remain = (9 - h - 1) * 3600 + (60 - m - 1) * 60 + (60 - s);
    fill.style.width = '0%';
    timeText.textContent = `${pad(Math.floor(remain/3600))}h ${pad(Math.floor((remain%3600)/60))}m`;
  } else {
    badge.className = 'session-badge session-inactive';
    badge.textContent = '세션 종료';
    label.textContent = '다음 세션까지';
    const remain = (24 - h + 9 - 1) * 3600 + (60 - m - 1) * 60 + (60 - s);
    fill.style.width = '100%';
    timeText.textContent = `${pad(Math.floor(remain/3600))}h ${pad(Math.floor((remain%3600)/60))}m`;
  }
}
setInterval(updateClock, 1000);
updateClock();

// ── 지표 계산 ──
function calcRSI(closes, period=14) {
  if (closes.length < period+1) return null;
  let gains=0, losses=0;
  for (let i=1;i<=period;i++) {
    const d=closes[i]-closes[i-1];
    if(d>0) gains+=d; else losses-=d;
  }
  let ag=gains/period, al=losses/period;
  for (let i=period+1;i<closes.length;i++) {
    const d=closes[i]-closes[i-1];
    ag=(ag*(period-1)+(d>0?d:0))/period;
    al=(al*(period-1)+(d<0?-d:0))/period;
  }
  if(al===0) return 100;
  return 100-100/(1+ag/al);
}

function calcMA(data, period) {
  if (data.length < period) return null;
  return data.slice(-period).reduce((a,b)=>a+b,0)/period;
}

function calcBB(closes, period=20) {
  if (closes.length < period) return null;
  const slice = closes.slice(-period);
  const ma = slice.reduce((a,b)=>a+b,0)/period;
  const std = Math.sqrt(slice.reduce((s,v)=>s+(v-ma)**2,0)/period);
  return { upper: ma+2*std, lower: ma-2*std, ma };
}

// ── 뉴욕 9시~10시 캔들 필터링 ──
function filterNYSession(candles) {
  return candles.filter(c => {
    const d = new Date(new Date(c.candle_date_time_utc).toLocaleString('en-US', { timeZone: 'America/New_York' }));
    const h = d.getHours();
    return h === 9;
  });
}

// ── 신호 분석 ──
function analyze(candles, ticker) {
  const all = candles;
  const session = filterNYSession(candles);
  
  if (all.length < 5) return null;

  const closes = all.map(c=>c.trade_price);
  const vols = all.map(c=>c.candle_acc_trade_volume);

  const rsi = calcRSI(closes);
  const ma5 = calcMA(closes, 5);
  const ma20 = calcMA(closes, 20);
  const bb = calcBB(closes, 20);
  const price = closes[closes.length-1];
  const avgVol = vols.slice(-20).reduce((a,b)=>a+b,0)/20;
  const lastVol = vols[vols.length-1];

  // 세션 고점/저점
  let sessionHigh = null, sessionLow = null;
  if (session.length > 0) {
    sessionHigh = Math.max(...session.map(c=>c.high_price));
    sessionLow = Math.min(...session.map(c=>c.low_price));
  }

  let buyScore=0, sellScore=0, reasons=[];

  // RSI
  if (rsi !== null) {
    if (rsi < 30) { buyScore+=2; reasons.push('RSI 과매도'); }
    else if (rsi < 42) { buyScore+=1; reasons.push('RSI 낮음'); }
    else if (rsi > 70) { sellScore+=2; reasons.push('RSI 과매수'); }
    else if (rsi > 58) { sellScore+=1; reasons.push('RSI 높음'); }
  }

  // BB
  if (bb) {
    const bw = bb.upper - bb.lower;
    const pos = bw > 0 ? (price - bb.lower)/bw : 0.5;
    if (pos < 0.1) { buyScore+=2; reasons.push('BB 하단'); }
    else if (pos < 0.25) { buyScore+=1; reasons.push('BB 하단권'); }
    else if (pos > 0.9) { sellScore+=2; reasons.push('BB 상단'); }
    else if (pos > 0.75) { sellScore+=1; reasons.push('BB 상단권'); }
  }

  // 이평선
  if (ma5 && ma20) {
    if (ma5 > ma20 && price > ma5) { buyScore+=1; reasons.push('정배열'); }
    else if (ma5 < ma20 && price < ma5) { sellScore+=1; reasons.push('역배열'); }
  }

  // 거래량
  if (lastVol > avgVol * 1.8) {
    if (buyScore >= sellScore) { buyScore+=1; reasons.push('거래량 급증'); }
    else { sellScore+=1; reasons.push('거래량 급증'); }
  }

  // 세션 고점 돌파
  if (sessionHigh && price > sessionHigh * 0.998) { buyScore+=1; reasons.push('세션 고점 근접'); }
  if (sessionLow && price < sessionLow * 1.002) { sellScore+=1; reasons.push('세션 저점 근접'); }

  let type;
  if (buyScore > sellScore && buyScore >= 2) type = 'buy';
  else if (sellScore > buyScore && sellScore >= 2) type = 'sell';
  else type = 'neutral';

  return {
    type, reasons,
    rsi: rsi ? rsi.toFixed(1) : '-',
    ma5: ma5 ? Math.round(ma5).toLocaleString() : '-',
    ma20: ma20 ? Math.round(ma20).toLocaleString() : '-',
    bb: bb ? { u: Math.round(bb.upper).toLocaleString(), l: Math.round(bb.lower).toLocaleString() } : null,
    vol: lastVol > avgVol * 1.5 ? '🔥급증' : '보통',
    volRatio: avgVol > 0 ? (lastVol/avgVol).toFixed(1) : '-',
    sessionHigh, sessionLow,
    price, changeRate: ticker.signed_change_rate * 100,
    buyScore, sellScore
  };
}

// ── 렌더링 ──
let allResults = [];
let currentFilter = 'all';

function fmtPrice(n) {
  if (!n) return '-';
  if (n >= 1000) return n.toLocaleString('ko-KR') + '원';
  return n.toFixed(4) + '원';
}

function renderCards() {
  const list = document.getElementById('coinsList');
  const filtered = currentFilter === 'all' ? allResults : allResults.filter(r => r.signal.type === currentFilter);

  if (!filtered.length) {
    list.innerHTML = '<div class="empty">해당 신호의 코인이 없어요</div>';
    return;
  }

  // 매수신호 먼저 정렬
  const sorted = [...filtered].sort((a,b) => {
    const order = {buy:0, neutral:1, sell:2};
    return order[a.signal.type] - order[b.signal.type] || b.signal.buyScore - a.signal.buyScore;
  });

  list.innerHTML = sorted.map((r, i) => {
    const s = r.signal;
    const isUp = s.changeRate >= 0;
    const icon = s.type==='buy'?'▲':s.type==='sell'?'▼':'◆';
    const label = s.type==='buy'?'매수 관심':s.type==='sell'?'매도 관심':'중립 관망';
    return `
      <div class="coin-card ${s.type}" style="animation-delay:${i*0.04}s">
        <div class="coin-top">
          <div class="coin-name-wrap">
            <span class="coin-symbol">${r.market.replace('KRW-','')}</span>
            <span class="coin-rank">#${r.rank}</span>
          </div>
          <div class="coin-price">
            <div>${fmtPrice(s.price)}</div>
            <div class="coin-change" style="color:${isUp?'var(--green)':'var(--red)'}">${isUp?'+':''}${s.changeRate.toFixed(2)}%</div>
          </div>
        </div>
        <div class="signal-pill ${s.type}">${icon} ${label}</div>
        <div class="indicators">
          <div class="ind">
            <div class="ind-name">RSI</div>
            <div class="ind-val" style="color:${s.rsi<30?'var(--green)':s.rsi>70?'var(--red)':'var(--text)'}">${s.rsi}</div>
            <div class="ind-sub">${s.rsi<30?'과매도':s.rsi>70?'과매수':'중립'}</div>
          </div>
          <div class="ind">
            <div class="ind-name">거래량</div>
            <div class="ind-val" style="color:${s.volRatio>1.5?'var(--yellow)':'var(--text)'}">${s.volRatio}x</div>
            <div class="ind-sub">${s.vol}</div>
          </div>
          <div class="ind">
            <div class="ind-name">MA5/20</div>
            <div class="ind-val" style="font-size:10px;color:${s.ma5>s.ma20?'var(--green)':'var(--red)'}">
              ${parseFloat(s.ma5.replace(/,/g,'')) > parseFloat(s.ma20.replace(/,/g,'')) ? '정배열' : '역배열'}
            </div>
            <div class="ind-sub">${s.ma5}</div>
          </div>
          <div class="ind">
            <div class="ind-name">BB위치</div>
            <div class="ind-val" style="font-size:10px">${s.bb ? s.bb.u : '-'}</div>
            <div class="ind-sub">${s.bb ? '하: '+s.bb.l : '-'}</div>
          </div>
        </div>
        ${s.sessionHigh ? `
        <div style="margin-top:8px;font-size:10px;color:var(--muted2);font-family:var(--font)">
          NY세션 고점: ${fmtPrice(Math.round(s.sessionHigh))} · 저점: ${fmtPrice(Math.round(s.sessionLow))}
        </div>` : ''}
        ${s.reasons.length ? `
        <div class="reasons">
          ${s.reasons.map(r=>`<span class="reason-tag">${r}</span>`).join('')}
        </div>` : ''}
      </div>
    `;
  }).join('');
}

function updateStats() {
  document.getElementById('statBuy').textContent = allResults.filter(r=>r.signal.type==='buy').length;
  document.getElementById('statNeutral').textContent = allResults.filter(r=>r.signal.type==='neutral').length;
  document.getElementById('statSell').textContent = allResults.filter(r=>r.signal.type==='sell').length;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

// ── 스캔 ──
async function startScan() {
  const btn = document.getElementById('scanBtn');
  const list = document.getElementById('coinsList');
  btn.disabled = true;
  btn.textContent = '스캔 중...';
  allResults = [];

  list.innerHTML = `<div class="loading"><div class="loading-spin"></div><div>거래량 상위 코인 불러오는 중...</div><div class="progress-text" id="progText"></div></div>`;

  try {
    // 1. 전체 마켓 + 티커 가져오기
    const [marketRes, tickerAllRes] = await Promise.all([
      proxyFetch('https://api.upbit.com/v1/market/all?isDetails=false'),
      proxyFetch('https://api.upbit.com/v1/ticker?markets=' +
        (await (await proxyFetch('https://api.upbit.com/v1/market/all?isDetails=false')).json())
          .filter(m=>m.market.startsWith('KRW-')).map(m=>m.market).join(','))
    ]);

    const markets = (await marketRes.json()).filter(m=>m.market.startsWith('KRW-'));
    const tickers = await tickerAllRes.json();

    // 거래대금 상위 15개 (BTC ETH 등 안전 코인 위주 + 거래량)
    const SAFE = ['KRW-BTC','KRW-ETH','KRW-XRP','KRW-SOL','KRW-BNB','KRW-DOGE','KRW-ADA','KRW-AVAX','KRW-DOT','KRW-LINK','KRW-MATIC','KRW-ATOM','KRW-UNI','KRW-LTC','KRW-ETC'];
    const sorted = tickers
      .filter(t => t.market.startsWith('KRW-'))
      .sort((a,b) => b.acc_trade_price_24h - a.acc_trade_price_24h);

    // 안전 코인 우선, 거래량 상위 보완해서 15개
    let targets = sorted.filter(t => SAFE.includes(t.market)).slice(0,15);
    if (targets.length < 15) {
      const extra = sorted.filter(t => !SAFE.includes(t.market) && !targets.find(x=>x.market===t.market));
      targets = [...targets, ...extra].slice(0,15);
    }

    // 2. 각 코인 캔들 분석
    for (let i=0; i<targets.length; i++) {
      const t = targets[i];
      document.getElementById('progText').textContent = `(${i+1}/${targets.length}) ${t.market.replace('KRW-','')} 분석 중...`;
      try {
        const res = await proxyFetch(`https://api.upbit.com/v1/candles/minutes/5?market=${t.market}&count=100`);
        const candles = (await res.json()).reverse();
        const signal = analyze(candles, t);
        if (signal) {
          allResults.push({ market: t.market, rank: i+1, signal });
        }
      } catch(e) { /* 개별 실패 무시 */ }
      await new Promise(r=>setTimeout(r,120)); // rate limit 방지
    }

    updateStats();
    renderCards();

  } catch(e) {
    list.innerHTML = `<div class="loading" style="color:var(--red)">스캔 실패: ${e.message}<br><br><button onclick="startScan()" style="margin-top:8px;padding:8px 16px;border-radius:8px;border:1px solid var(--blue);background:transparent;color:var(--blue);font-family:var(--font);cursor:pointer;">다시 시도</button></div>`;
  }

  btn.disabled = false;
  btn.textContent = '▶ 다시 스캔';
}
</script>
